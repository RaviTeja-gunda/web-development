<html>
<head>
	<meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
	<style>
		.login{padding:0px 0px;}
		.size{font-size:20;
			color:white;}
		button:active{transform:translateY(10px);}
		body{
			background-image:url("login.webp");
			background-repeat: no-repeat;
			background-size: cover;
		}
		form{
			margin-top: 150px;
			margin-left: 100px;
		}
		.input{font-size:20;
			background-color:rgba(170, 185, 180, 0.555);
		}
	</style>
    <script>
		function validation() {
            var password=document.myform.newpass.value;
			if(password.length<8) {
				window.alert("Password contains atleast 8 charcters");
				return false;
			}
			var conf=document.myform.conpass.value;
			if(conf!=password) {
				window.alert("Enter Retype password correctly...");
				return false;
            }
        }
	</script>
</head>
<body>
	<form action="newpass.jsp" name="myform" onsubmit="return validation()">
	<table align="center" style="box-shadow:5px 5px 5px 5px">
		<caption><h1 style="color:crimson"><u>CHANGE YOUR PASSWORD</u></h1></caption>
		<th colspan='2' align="center" style="font-family: Arial, Helvetica, sans-serif;color: blanchedalmond;"><h2>SUPER BANK OF INDIA</h2></th><br><br>
		<tr>
			<td align="right" class="size" required>NEW PASSWORD :</td>
			<td><input type="password" name="newpass" required class="input"></td>
		</tr>
		<tr>
			<td>
				<br>
			</td>
		</tr>
		<tr>
			<td align="right" class="size">RETYPE PASSWORD :</td>
			<td><input type="password" name="conpass" class="input" required></td>
		</tr>
		<tr>
			<td>
				<br>
			</td>
		</tr>
        <tr>
            <td colspan='2' align="center"><input type="submit" value="Done" class="size" style="background:transparent;font-family:serif;background-color:darksalmon;"></td>
        </tr>
	</table>
	</form>
</body>
</html>
